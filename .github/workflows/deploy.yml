name: Deploy Polymarket Bot to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            mkdir -p ~/polymarket-worldcup-volume-bot
            cd ~/polymarket-worldcup-volume-bot
            
            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }}.git .
            else
              git fetch --all
              git reset --hard origin/main
            fi
            
            echo "${{ secrets.ENV_CONTENT }}" > .env
            
            chmod +x deploy.sh
            ./deploy.sh
            
            sudo cp polymarket-bot.service /etc/systemd/system/polymarket-bot.service
            sudo systemctl daemon-reload
            sudo systemctl enable polymarket-bot.service
            sudo systemctl restart polymarket-bot.service
            
            echo "Deployment completed successfully!"
            sudo systemctl status polymarket-bot.service --no-pager
